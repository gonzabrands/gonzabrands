<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Gonzabrands</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }
        h1 span { color: #888; font-weight: 300; }
        p {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            transition: background 0.2s, color 0.2s;
        }
        .btn:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin <span>Panel</span></h1>
        <p>Gonzabrands — Administration Area</p>
        <a href="#" class="btn">Login to Dashboard</a>
    </div>
</body>
</html>
